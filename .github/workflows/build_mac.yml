name: Build macOS App

on:
  workflow_dispatch: 

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Скачиваем код из репозитория
        uses: actions/checkout@v4

      - name: Устанавливаем Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Добавляем установку Pillow для умного ресайза с отступами
      - name: Устанавливаем библиотеки
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview pillow

      # Генерируем правильный .iconset с отступами ~80% (стандарт Apple HIG)
      - name: Создаем Mac-иконку (.icns) из вашего логотипа
        run: |
          python -c '
          import os
          from PIL import Image

          img = Image.open("bkL.png")
          os.makedirs("icon.iconset", exist_ok=True)

          # Список размеров (название файла, размер холста, размер иконки внутри холста)
          # Согласно Apple HIG, размер иконки внутри должен быть ~80-82% от размера холста
          sizes = [
              ("16x16", 16, 13),
              ("16x16@2x", 32, 26),
              ("32x32", 32, 26),
              ("32x32@2x", 64, 52),
              ("128x128", 128, 105),
              ("128x128@2x", 256, 210),
              ("256x256", 256, 210),
              ("256x256@2x", 512, 420),
              ("512x512", 512, 420),
              ("512x512@2x", 1024, 824)
          ]

          for name, canvas_size, icon_size in sizes:
              # Изменяем размер иконки с сохранением пропорций
              resized_icon = img.resize((icon_size, icon_size), Image.Resampling.LANCZOS)
              # Создаем прозрачный холст нужного размера
              canvas = Image.new("RGBA", (canvas_size, canvas_size), (0, 0, 0, 0))
              # Центрируем иконку на холсте
              offset = (canvas_size - icon_size) // 2
              canvas.paste(resized_icon, (offset, offset))
              # Сохраняем
              canvas.save(f"icon.iconset/icon_{name}.png")
          '
          # Превращаем iconset в готовый файл .icns
          iconutil -c icns icon.iconset -o icon.icns

      - name: Собираем приложение через PyInstaller
        run: |
          pyinstaller --clean \
                      --windowed \
                      --noupx \
                      --icon="icon.icns" \
                      --add-data "bkL.png:." \
                      --name "Baikal Downloader" \
                      server.py

      - name: Устанавливаем утилиту для создания DMG
        run: brew install create-dmg

      - name: Упаковываем в DMG образ
        run: |
          create-dmg \
            --volname "Baikal Downloader Installer" \
            --volicon "icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Baikal Downloader.app" 150 190 \
            --hide-extension "Baikal Downloader.app" \
            --app-drop-link 450 190 \
            "Baikal_Downloader_5.5.16_macOS.dmg" \
            "dist/Baikal Downloader.app"

      - name: Загружаем готовый DMG на GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Baikal-Downloader-macOS
          path: Baikal_Downloader_5.5.16_macOS.dmg
